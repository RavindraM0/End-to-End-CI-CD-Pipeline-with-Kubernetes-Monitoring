apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-app-alerts
  namespace: monitoring

spec:
  groups:
  - name: devops-app.rules
    interval: 30s
    rules:
    
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value }}"
    
    - alert: HighLatency
      expr: histogram_quantile(0.95, http_request_duration_seconds_bucket) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected"
        description: "p95 latency is {{ $value }}s"
    
    - alert: PodCrashing
      expr: rate(container_last_seen{pod=~"devops-app.*"}[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Pod is crashing"
        description: "Pod {{ $labels.pod }} is crashing"
    
    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"devops-app.*"} / 1024 / 1024 > 200
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Memory usage is {{ $value }}Mi"
